<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weekend Availability ⚽</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="stadium">


<div class="field">


<div class="container">

<div class="card">


<div id="screen1">

<h1>⚽ Checking player availability...</h1>

<p class="subtitle">
📋 Finalizing this weekend's line-up...
</p>


<h2>Are you free this weekend?</h2>


<button class="btn blue" onclick="acceptCall()">
⚽ Accept Call-Up
</button>


<button class="btn red" onclick="declineCall()">
🚫 Decline
</button>


</div>




<div id="screen2" class="hidden">

<h1>📅 Pick the Matchday</h1>

<p>When should we play this fixture?</p>


<button class="btn blue" onclick="chooseDay('Saturday')">
Saturday
</button>


<button class="btn blue" onclick="chooseDay('Sunday')">
Sunday
</button>


</div>





<div id="screen3" class="hidden">

<h1>📍 Choose the Stadium</h1>

<p>Where will this match happen?</p>


<button class="btn blue" onclick="choosePlace('☕ Cafe')">
☕ Cafe
</button>


<button class="btn blue" onclick="choosePlace('🌿 Nature Walk')">
🌿 Nature Walk
</button>


<button class="btn blue" onclick="choosePlace('📚 Bookstore')">
📚 Bookstore
</button>


<button class="btn blue" onclick="choosePlace('🎬 Movie')">
🎬 Movie
</button>


<button class="btn blue" onclick="choosePlace('🛍️ Mall')">
🛍️ Mall
</button>


</div>





<div id="screen4" class="hidden">


<h1>🕒 Choose Kick-Off Time</h1>


<p>Don't be late, the referee is watching! ⏱️</p>


<button class="btn blue" onclick="chooseTime('10:00 AM - 12:00 PM')">
🕙 10:00 AM - 12:00 PM
</button>


<button class="btn blue" onclick="chooseTime('1:00 PM - 3:00 PM')">
🕐 1:00 PM - 3:00 PM
</button>


<button class="btn blue" onclick="chooseTime('4:00 PM - 6:00 PM')">
🕓 4:00 PM - 6:00 PM
</button>


<button class="btn blue" onclick="chooseTime('7:00 PM - 9:00 PM')">
🕖 7:00 PM - 9:00 PM
</button>


</div>





<div id="result" class="hidden">

<div id="finalText"></div>


<button id="shareBtn" class="btn blue hidden" onclick="shareResult()">
📲 Share Result
</button>


</div>



</div>

</div>


<!-- Football field objects -->

<div id="goal">
🥅
</div>


<div id="ball">
⚽
</div>


</div>

</div>


<script src="script.js"></script>


</body>

</html>
